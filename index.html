<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1b2735">
    
    <title>Dam Game</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://i.postimg.cc/gcZg7rDq/IMG-7635.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/gcZg7rDq/IMG-7635.jpg">
</head>
<body data-theme="neon">

    <div id="floating-bg"></div>

    <div class="game-wrapper">

        <div id="start-screen">
            <button id="start-btn-main" class="btn-3d start-3d" onclick="startGame()" data-i18n="startBtn">▶ دەستپێکرن</button>
            <button id="menu-btn-main" class="btn-3d menu-3d" onclick="toggleMenu()" data-i18n="menuBtn">⚙️ ڕێکخستن</button>
        </div>
        
        <div id="game-screen" class="hidden-screen">
            
            <div class="player-info p2-area">
                <button class="icon-menu-btn" onclick="toggleMenu()" title="ڕێکخستن">⚙️</button>
                <div class="status-indicator p2-status" id="status2" data-i18n="statusTurn2">دۆرە یا یاریزانێ دووێ یە</div>
                <div class="score p2-score">
                    <span data-i18n="player2">یاریزان ٢</span>: <span id="score2">0</span>
                    <div class="timer" id="timer2"></div>
                </div>
            </div>
            
            <div id="board"></div>
            
            <div class="player-info p1-area">
                <div class="score p1-score">
                    <span data-i18n="player1">یاریزان ١</span>: <span id="score1">0</span>
                    <div class="timer" id="timer1"></div>
                </div>
                <div class="status-indicator p1-status active-status" id="status1" data-i18n="statusTurn1">دۆرە یا یاریزانێ ئێکێ یە</div>
                <button class="icon-menu-btn" onclick="toggleMenu()" title="ڕێکخستن">⚙️</button>
            </div>
            
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content settings-content">
            <h2 data-i18n="menuTitle">⚙️ ڕێکخستنێن یاریێ</h2>
            
            <div class="setting-group">
                <label data-i18n="langLabel">🌐 زمان (Language):</label>
                <select id="lang-selector" onchange="changeLanguage()">
                    <option value="ku-badini">کوردی (بادینی)</option>
                    <option value="ku-sorani">کوردی (سۆرانی)</option>
                    <option value="fa">فارسی</option>
                    <option value="ar">العربية</option>
                    <option value="tr">Türkçe</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="setting-group">
                <label data-i18n="modeLabel">🎮 شێوازێ یاریکرنێ:</label>
                <select id="game-mode" onchange="handleSettingChange()">
                    <option value="pvp" data-i18n="modePvp">دگەل هەڤالی د ئێک مۆبایل دا</option>
                    <option value="pve" data-i18n="modePve">دژی کۆمپیوتەری (AI)</option>
                    <option value="online" data-i18n="modeOnline">یاریکرن ب ئۆنلاین (Online)</option>
                </select>
                <select id="ai-difficulty" onchange="handleSettingChange()" style="display:none; margin-top:5px;">
                    <option value="easy" data-i18n="diffEasy">AI: زەعیف</option>
                    <option value="normal" selected data-i18n="diffNormal">AI: نۆرمال</option>
                    <option value="hard" data-i18n="diffHard">AI: ب زەحمەت</option>
                </select>
            </div>

            <div class="setting-group">
                <label data-i18n="timeLabel">⏳ دەمێ یاریکرنێ:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="timer-setting" onchange="handleSettingChange()" style="flex: 1;">
                        <option value="unlimited" selected data-i18n="timeUnlimited">دەم: بێسنوور (ئازاد)</option>
                        <option value="custom" data-i18n="timeCustom">دەم: دیارکری (خولەک)</option>
                    </select>
                    <input type="number" id="timer-minutes" min="1" max="60" value="5" onchange="handleSettingChange()" style="display:none; width: 70px;">
                </div>
            </div>

            <div class="setting-group">
                <label data-i18n="themeLabel">🎨 ثێم و دیزاینا یاریێ:</label>
                <select id="theme-selector" onchange="changeTheme()">
                    <option value="neon" data-i18n="themeNeon">١. نیۆن (Neon)</option>
                    <option value="wood" data-i18n="themeWood">٢. دارین (Wood)</option>
                    <option value="gold" data-i18n="themeGold">٣. زێڕین (Gold)</option>
                    <option value="dark" data-i18n="themeDark">٤. تاریک (Dark)</option>
                    <option value="ocean" data-i18n="themeOcean">٥. دەریایی (Ocean)</option>
                    <option value="cyber" data-i18n="themeCyber">٦. سایبەرپانک (Cyber)</option>
                    <option value="forest" data-i18n="themeForest">٧. دارستان (Forest)</option>
                    <option value="vintage" data-i18n="themeVintage">٨. کەڤنار (Vintage)</option>
                    <option value="lava" data-i18n="themeLava">٩. ئاگرین (Lava)</option>
                    <option value="royal" data-i18n="themeRoyal">١0. شاهانە (Royal)</option>
                </select>
            </div>

            <div class="action-buttons-grid">
                <button id="mute-btn" class="action-btn" onclick="toggleMute()" data-i18n="soundOn">🔊 دەنگ</button>
                <button id="restart-btn" class="action-btn" onclick="resetGame(true)" data-i18n="restartBtn">🔄 نوی کرنەڤە</button>
                <button id="install-btn" class="action-btn" style="display:none;" onclick="installApp()" data-i18n="installBtn">📥 دابەزاندن</button>
            </div>

            <button onclick="toggleMenu()" class="action-btn close-menu-btn" data-i18n="closeBtn">❌ گرتن</button>
        </div>
    </div>

    <div id="online-modal" class="hidden">
        <div class="modal-content online-content">
            <h2 data-i18n="onlinePlayTitle">🌐 یاریکرن ب ئۆنلاین</h2>
            
            <div class="online-options">
                <button id="btn-show-host" class="action-btn host-btn" onclick="showHostUI()" data-i18n="hostGame">دروستکرنا ژوورێ (Host)</button>
                <button id="btn-show-join" class="action-btn join-btn" onclick="showJoinUI()" data-i18n="joinGame">چوونە ژوور (Client)</button>
            </div>

            <div id="host-ui" style="display: none;">
                <p data-i18n="yourRoomCode" style="color: #fff; font-size: 1.1rem; margin-bottom: 5px;">کۆدێ ژوورا تە ئەڤەیە:</p>
                <div class="room-code-display" id="display-room-code">----</div>
                <p class="waiting-text" data-i18n="waitPlayer">چاڤەڕێی یاریزانێ ٢ یە...</p>
                <button class="action-btn close-menu-btn" onclick="cancelOnline()" data-i18n="cancelBtn" style="margin-top: 15px;">پاشگەزبوون</button>
            </div>

            <div id="join-ui" style="display: none;">
                <p data-i18n="enterRoomCode" style="color: #fff; font-size: 1.1rem; margin-bottom: 5px;">کۆدێ ژوورێ ل ڤێرە بنڤیسە:</p>
                <input type="number" id="join-code-input" placeholder="نموونە: 1234">
                <button class="action-btn start-join-btn" onclick="joinRoom()" data-i18n="joinRoomBtn">چوونە ژوور</button>
                <button class="action-btn close-menu-btn" onclick="cancelOnline()" data-i18n="cancelBtn" style="margin-top: 15px;">پاشگەزبوون</button>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="hidden">
        <div class="modal-content">
            <h2 id="winner-text">سەرکەفتن!</h2>
            <button onclick="resetGame(true)" data-i18n="restartBtn">یارییەکا نوی</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
